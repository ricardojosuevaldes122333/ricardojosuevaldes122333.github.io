<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPERIO MC | HUB PUENTE ABSOLUTO</title>
    <style>
        body { background-color: #0f111a; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 30px 20px; }
        .titulo { font-size: 3rem; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; margin-bottom: 5px; }
        .subtitulo { color: #8a92b2; margin-bottom: 35px; font-size: 1rem; }
        
        .contenedor-busqueda { background: #1a1d29; max-width: 400px; margin: 0 auto 20px auto; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .skins { border: 2px solid #e91e63; box-shadow: 0 0 15px rgba(233,30,99,0.2); }
        .mods { border: 2px solid #f39c12; box-shadow: 0 0 15px rgba(243,156,18,0.2); }
        .servers { border: 2px solid #9b59b6; box-shadow: 0 0 15px rgba(155,89,182,0.2); }
        
        .contenedor-busqueda h3 { margin-top: 0; font-size: 1.2rem; letter-spacing: 1px; }
        .skins h3 { color: #e91e63; }
        .mods h3 { color: #f39c12; }
        .servers h3 { color: #9b59b6; }
        
        .caja-texto { width: 85%; padding: 10px; border-radius: 8px; border: none; background: #24293e; color: #fff; font-size: 1rem; margin-bottom: 15px; text-align: center; }
        
        .btn-buscar { color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 90%; transition: 0.3s; text-decoration: none; display: inline-block; }
        .btn-skins { background: #e91e63; }
        .btn-skins:hover { background: #ff2a75; box-shadow: 0 0 10px #e91e63; }
        .btn-mods { background: #f39c12; }
        .btn-mods:hover { background: #e67e22; box-shadow: 0 0 10px #f39c12; }
        
        .btn-directo { background: #9b59b6; padding: 18px 20px; font-size: 1.1rem; width: 90%; box-sizing: border-box; }
        .btn-directo:hover { background: #8e44ad; box-shadow: 0 0 15px #9b59b6; transform: scale(1.02); }
        
        .info-status { color: #57ff57; font-size: 0.85rem; font-weight: bold; margin-top: 10px; letter-spacing: 1px; }
        
        .grid { display: grid; gap: 15px; max-width: 400px; margin: 0 auto; }
        .btn-hub { background: #fff; color: #000; padding: 15px; border-radius: 15px; text-decoration: none; font-size: 1.2rem; font-weight: bold; border: 2px solid #fff; transition: 0.3s; display: block; box-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .btn-hub:hover { background: #000; color: #fff; transform: scale(1.03); }
    </style>
</head>
<body>
    <h1 class="titulo">🎮 IMPERIO MC 🎮</h1>
    <p class="subtitulo">HUB DE OPERACIONES ESTÁTICO</p>

    <!-- BUSCADOR DE SKINS -->
    <div class="contenedor-busqueda skins">
        <h3>🎨 BUSCADOR DE SKINS</h3>
        <input type="text" id="busquedaSkin" class="caja-texto" placeholder="Ej. militar, creeper, pvp...">
        <button onclick="buscarSkin()" class="btn-buscar btn-skins">Buscar en The Skindex</button>
    </div>

    <!-- BUSCADOR DE MODS -->
    <div class="contenedor-busqueda mods">
        <h3>📦 BUSCADOR DE PUROS MODS / ADDONS</h3>
        <input type="text" id="busquedaMod" class="caja-texto" placeholder="Ej. lucky blocks, guns...">
        <button onclick="buscarMod()" class="btn-buscar btn-mods">Buscar Addons Bedrock</button>
    </div>

    <!-- SECCIÓN DE SERVIDORES REDIRECCIÓN DIRECTA (SIN CAJA DE TEXTO) -->
    <div class="contenedor-busqueda servers">
        <h3>🌐 LISTA DE SERVIDORES BEDROCK</h3>
        <a href="https://minecraft-server-list.com/sort/bedrock/" target="_blank" class="btn-buscar btn-directo">
            🚀 ENTRAR AL CATÁLOGO GENERAL
        </a>
        <div class="info-status">● VERIFICADOS ON-LINE STRATEGIC</div>
    </div>

    <div class="grid">
        <a href="https://www.minecraftskins.net/skineditor" class="btn-hub" target="_blank">🎨 EDITOR DE SKINS ANIMADO</a>
    </div>

    <script>
        function buscarSkin() {
            const termino = document.getElementById('busquedaSkin').value.trim();
            if (termino === "") { alert("¡Riky, escribe algo!"); return; }
            window.open(`https://www.minecraftskins.com/search/skin/${encodeURIComponent(termino)}/1/`, '_blank');
        }

        function buscarMod() {
            const termino = document.getElementById('busquedaMod').value.trim();
            if (termino === "") { alert("¡Riky, no dejes el cuadro vacío!"); return; }
            window.open(`https://www.curseforge.com/minecraft-bedrock/addons/search?search=${encodeURIComponent(termino)}`, '_blank');
        }
    </script>
</body>
</html>
