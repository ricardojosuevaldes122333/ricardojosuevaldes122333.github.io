echo '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>🔥 IMPERIO MC 🔥</title><style>:root { --bg: #0f0f13; } body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; transition: background 0.5s; } .section { max-width: 500px; margin: 20px auto; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 15px; } .btn { margin: 5px; padding: 10px; cursor: pointer; border: none; border-radius: 5px; color: #fff; font-weight: bold; } .item { display: flex; justify-content: space-between; background: #282a36; margin: 10px 0; padding: 10px; border-radius: 5px; } button.copy { background: #50fa7b; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; color: black; font-weight: bold; }</style></head><body><h1>🎮 IMPERIO MC 🎮</h1><div><button class="btn" style="background:#50fa7b" onclick="change(0)">SKYWARS</button><button class="btn" style="background:#ff79c6" onclick="change(1)">BEDWARS</button><button class="btn" style="background:#8be9fd" onclick="change(2)">PVP</button><button class="btn" style="background:#ffb86c" onclick="change(3)">ANÁRQUICOS</button></div><div class="section" id="list"></div><script>const data = [{cat:"SKYWARS", bg:"#1a1a24", items:[["Hive SW","geo.hivebedrock.network"], ["Cube SW","play.cubecraft.net"]]}, {cat:"BEDWARS", bg:"#2d1b26", items:[["Hive BW","geo.hivebedrock.network"], ["Jartex BW","bedrock.jartex.host"]]}, {cat:"PVP", bg:"#1b2d2d", items:[["Zeqa PVP","zeqa.net"], ["Versai","versai.pro"]]}, {cat:"ANÁRQUICOS", bg:"#2d1b1b", items:[["2b2t","2b2t.org"], ["Lifesteal","bedrock.lifestealmc.net"]]}]; function change(i) { document.body.style.background = data[i].bg; let html = "<h2>"+data[i].cat+"</h2>"; data[i].items.forEach(it => { html += "<div class=\"item\">"+it[0]+" <button class=\"copy\" onclick=\"navigator.clipboard.writeText(\''+it[1]+'\')\">Copiar IP</button></div>"; }); document.getElementById("list").innerHTML = html; } change(0);</script></body></html>' > index.html
