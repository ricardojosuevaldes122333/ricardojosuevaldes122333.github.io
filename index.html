<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPERIO MC | HUB</title>
    <style>
        body { background-color: #0f111a; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px 20px; }
        .titulo { font-size: 3rem; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; margin-bottom: 10px; }
        .subtitulo { color: #8a92b2; margin-bottom: 40px; }
        
        .contenedor-busqueda { background: #1a1d29; max-width: 400px; margin: 0 auto 25px auto; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .skins { border: 2px solid #e91e63; box-shadow: 0 0 15px rgba(233,30,99,0.2); }
        .mods { border: 2px solid #f39c12; box-shadow: 0 0 15px rgba(243,156,18,0.2); }
        
        .contenedor-busqueda h3 { margin-top: 0; }
        .skins h3 { color: #e91e63; }
        .mods h3 { color: #f39c12; }
        
        .caja-texto { width: 85%; padding: 10px; border-radius: 8px; border: none; background: #24293e; color: #fff; font-size: 1rem; margin-bottom: 15px; text-align: center; }
        
        .btn-buscar { color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 90%; transition: 0.3s; }
        .btn-skins { background: #e91e63; }
        .btn-skins:hover { background: #ff2a75; box-shadow: 0 0 10px #e91e63; }
        .btn-mods { background: #f39c12; }
        .btn-mods:hover { background: #e67e22; box-shadow: 0 0 10px #f39c12; }
        
        .grid { display: grid; gap: 20px; max-width: 400px; margin: 0 auto; }
        .btn-hub { background: #24293e; color: #fff; padding: 15px; border-radius: 15px; text-decoration: none; font-size: 1.2rem; font-weight: bold; border: 2px solid #00ffcc; transition: 0.3s; display: block; }
        .btn-hub:hover { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1 class="titulo">🎮 IMPERIO MC 🎮</h1>
    <p class="subtitulo">HUB CENTRAL DE OPERACIONES</p>

    <!-- BUSCADOR DE SKINS -->
    <div class="contenedor-busqueda skins">
        <h3>🎨 BUSCADOR DE SKINS</h3>
        <input type="text" id="busquedaSkin" class="caja-texto" placeholder="Ej. militar, creeper, pvp...">
        <button onclick="buscarSkin()" class="btn-buscar btn-skins">Buscar en The Skindex</button>
    </div>

    <!-- BUSCADOR DE MODS -->
    <div class="contenedor-busqueda mods">
        <h3>📦 BUSCADOR DE MODS</h3>
        <input type="text" id="busquedaMod" class="caja-texto" placeholder="Ej. lucky blocks, optimización, furniture...">
        <button onclick="buscarMod()" class="btn-buscar btn-mods">Buscar en CurseForge</button>
    </div>

    <div class="grid">
        <a href="https://www.minecraftskins.net/skineditor" class="btn-hub" target="_blank">🎨 EDITOR DE SKINS</a>
    </div>

    <script>
        function buscarSkin() {
            const termino = document.getElementById('busquedaSkin').value.trim();
            if (termino === "") {
                alert("¡Riky, escribe algo para buscar la skin!");
                return;
            }
            const urlFinal = `https://www.minecraftskins.com/search/skin/${encodeURIComponent(termino)}/1/`;
            window.open(urlFinal, '_blank');
        }

        function buscarMod() {
            const termino = document.getElementById('busquedaMod').value.trim();
            if (termino === "") {
                alert("¡Riky, no dejes el cuadro de mods vacío!");
                return;
            }
            // URL exacta de búsqueda para mods de Minecraft en CurseForge
            const urlFinal = `https://www.curseforge.com/minecraft/search?search=${encodeURIComponent(termino)}`;
            window.open(urlFinal, '_blank');
        }
    </script>
</body>
</html>
